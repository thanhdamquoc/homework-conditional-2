<script>
    // Bậc 1: Cho kWh từ 0 – 50	1.678 -> 50
    // Bậc 2: Cho kWh từ 51 – 100	1.734 -> 50
    // Bậc 3: Cho kWh từ 101 – 200	2.014 -> 100
    // Bậc 4: Cho kWh từ 201 – 300	2.536 -> 100
    // Bậc 5: Cho kWh từ 301 – 400	2.834 -> 100
    // Bậc 6: Cho kWh từ 401 trở lên	2.927
    let kwh = parseInt(prompt("kWh"));
    let cost;
    if (kwh <= 0) {
        cost = 0;
    } else if (kwh <= 50) {
        cost = (kwh * 1678);
    } else if (kwh <= 100) {
        cost = (50 * 1678) + ((kwh-50) * 1734);
    } else if (kwh <= 200) {
        cost = (50 * 1678) + (50 * 1734) + ((kwh-100) * 2014);
    } else if (kwh <= 300) {
        cost = (50 * 1678) + (50 * 1734) + (100 * 2014) + ((kwh-200) * 2536);
    } else if (kwh <= 400) {
        cost = (50 * 1678) + (50 * 1734) + (100 * 2014) + (100 * 2536) + ((kwh-300) * 2834);
    } else {
        cost = (50 * 1678) + (50 * 1734) + (100 * 2014) + (100 * 2536) + (100 * 2834) + ((kwh-400) * 2927);
    }
    alert(cost);
</script>
