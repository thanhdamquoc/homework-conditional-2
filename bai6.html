<script>
    // ax +  b = 0
    let a=  parseInt(prompt("what is 'a' in 'ax +  b = 0'"));
    let b=  parseInt(prompt("what is 'b' in 'ax +  b = 0'"));
    if (a === 0) {
        if (b === 0) {
            alert("Vo so nghiem");
        } else {
            alert("Vo nghiem");
        }
    } else {
        let x = (-b)/a;
        alert(x)
    }
</script>
