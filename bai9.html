<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>

<body>
<!--Bài 9: Kiểm tra xem 3 số thực (a,b,c) nhập vào có phải là cạnh của một tam giác. Điều kiện để a,b,c là cạnh của một tam giác là:-->
<!--a,b,c > 0-->
<!--a + b > c-->
<!--b + c > a-->
<!--a + c > b-->
</body>
</html>
<script>
    let a = parseInt(prompt("a"));
    let b = parseInt(prompt("b"));
    let c = parseInt(prompt("c"));
    if ((a>0) && (b>0) && (c>0) && ((a + b) > c) && ((b + c) > a) && ((a + c) > b)) {
        alert("a, b, c la canh cua mot tam giac");
    } else {
        alert("a, b, c khong phai la canh cua mot tam giac");
    }
</script>
